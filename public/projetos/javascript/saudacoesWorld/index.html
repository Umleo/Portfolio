<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Saudações World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="container d-flex flex-column align-items-center">
        <div id="form">
            <form class=" d-flex flex-column align-items-center">
                <div class="mb-3">
                    <label for="inputUsuario" class="form-label">Nome do usuário</label>
                    <input type="email" class="form-control" id="inputUsuario" aria-describedby="emailHelp">
                </div>
                <div class="mb-3">
                    <label for="inputSenha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="inputSenha">
                </div>
                <button id="login" type="submit" class="btn btn-primary">Entrar</button>
            </form>
        </div>
    
        <div id="saudacoes" hidden>
            <div class="d-flex flex-column align-items-center">
                <h1 id="saudacao"></h1>
                <span id="info"></span>
                <button id="logout" type="submit" class="btn btn-danger">Sair</button>
            </div>
        </div>
    
        <div id="adeus" hidden>
            <h1 id="adeusMsg"></h1>
        </div>
    </section>
    
	<script type="module" src="main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
